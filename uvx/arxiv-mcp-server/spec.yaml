# ArXiv MCP Server Configuration
# A flexible arXiv search and analysis service with MCP protocol support
# Package: https://pypi.org/project/arxiv-mcp-server/
# Repository: https://github.com/blazickjp/arxiv-mcp-server
# Will build as: ghcr.io/stacklok/dockyard/uvx/arxiv-mcp-server:0.3.0

metadata:
  name: arxiv-mcp-server
  description: "A flexible arXiv search and analysis service with MCP protocol support"
  protocol: uvx

spec:
  package: "arxiv-mcp-server"
  version: "0.4.12"

provenance:
  repository_uri: "https://github.com/blazickjp/arxiv-mcp-server"
  repository_ref: "refs/heads/main"

# Security allowlist for false positives
security:
  allowed_issues:
    - code: "AITech-1.1"
      tool: "semantic_search"
      reason: |
        False positive - YARA flags the tool description for coercive workflow
        language ("IMPORTANT: only searches your local downloaded collection",
        "Use search_papers ... then download_paper ... before using this tool").
        These are legitimate operational instructions about tool ordering and
        local-vs-remote scope, not attempts to override the model's system
        prompt. The description does not contain "ignore previous instructions"
        or any system-prompt-override pattern. Verified in v0.4.12.
