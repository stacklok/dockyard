# Firecrawl MCP Server Configuration
# Web scraping and content extraction via the Firecrawl API
# Package: https://www.npmjs.com/package/firecrawl-mcp
# Repository: https://github.com/mendableai/firecrawl-mcp-server
# Will build as: ghcr.io/stacklok/dockyard/npx/firecrawl-mcp:3.20.1

metadata:
  name: firecrawl-mcp
  description: "MCP server for web scraping, crawling, and structured content extraction using the Firecrawl API"
  protocol: npx

spec:
  package: "firecrawl-mcp"
  version: "3.20.1"

provenance:
  repository_uri: "https://github.com/mendableai/firecrawl-mcp-server"
  repository_ref: "refs/heads/main"

security:
  # Server requires FIRECRAWL_API_KEY or FIRECRAWL_API_URL to start - cannot complete startup in CI
  insecure_ignore: true
