# Matt Pocock setup-matt-pocock-skills Skill
# Scaffold the per-repo config (issue tracker, triage labels, domain doc layout)
# that the other Matt Pocock engineering skills consume.
# Source: https://github.com/mattpocock/skills
# Will publish as: ghcr.io/stacklok/dockyard/skills/setup-matt-pocock-skills:0.1.0

metadata:
  name: setup-matt-pocock-skills
  description: "Sets up an `## Agent skills` block in AGENTS.md/CLAUDE.md and `docs/agents/` so the engineering skills know this repo's issue tracker (GitHub or local markdown), triage label vocabulary, and domain doc layout. Run before first use of `to-issues`, `to-prd`, `triage`, `diagnose`, `tdd`, `improve-codebase-architecture`, or `zoom-out` — or if those skills appear to be missing context about the issue tracker, triage labels, or domain docs."

