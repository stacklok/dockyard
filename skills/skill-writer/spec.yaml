# Sentry skill-writer Skill
# Create, synthesize, and iteratively improve agent skills.
# Source: https://github.com/getsentry/skills
# Will publish as: ghcr.io/stacklok/dockyard/skills/skill-writer:0.1.0

metadata:
  name: skill-writer
  description: "Create, synthesize, and iteratively improve agent skills per the Agent Skills specification — handles source capture with depth gates, authoring, description optimization, registration, and validation"

spec:
  repository: "https://github.com/getsentry/skills"
  ref: "d7a020acb22e01604ccf55225b2b92330f9c2444"  # main as of 2026-04-20
  path: "skills/skill-writer"
  version: "0.1.0"

provenance:
  repository_uri: "https://github.com/getsentry/skills"
  repository_ref: "refs/heads/main"

security:
  allowed_issues:
    - rule_id: MANIFEST_MISSING_LICENSE
      reason: "getsentry/skills is licensed Apache-2.0 at the repository root; upstream does not embed an SPDX license identifier in per-skill SKILL.md frontmatter."
    - rule_id: ATR_MCP_MALICIOUS_RESPONSE
      reason: |
        False positive - matches on the literal word "references" / "reference"
        in `references/workflow-patterns.md`, which is the skill's own pointer
        list to its bundled reference docs (the standard skill-writer reference
        architecture). The pattern is not an MCP tool response; it's static
        skill instruction text. Verified at digest
        5cfc9e22a91c2d3a230c4d5154ea0f1babce3b28.
    - rule_id: ATR_HIGH_RISK_TOOL_GATE
      reason: |
        False positive - regex matches on word fragments (`kill`, `Exec`, `exec`,
        `format`) inside `references/workflow-patterns.md`, where these appear in
        documentation about workflow patterns ("kill switch", "execution model",
        "format pattern"). They are not tool invocations. Verified at digest
        5cfc9e22a91c2d3a230c4d5154ea0f1babce3b28.
