spec:
  repository: "https://github.com/datadog-labs/agent-skills"
  ref: "2f664fd5042d6838dfc06b605c6e2619eb8079c5"
  path: "dd-pup"
  version: "0.1.0"

provenance:
  repository_uri: "https://github.com/datadog-labs/agent-skills"
